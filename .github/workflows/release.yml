name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag
        run: |
          if git ls-remote --tags origin "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.tag.outputs.exists == 'false'
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | head -n1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          git log "$RANGE" --pretty=format:'- %s  %h' --no-merges > /tmp/release_notes.md
          if [ -n "$PREV_TAG" ]; then
            printf '\n\n---\n\nhttps://github.com/%s/compare/%s...%s\n' "${{ github.repository }}" "$PREV_TAG" "$VERSION" >> /tmp/release_notes.md
          fi

      - name: Create release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.version.outputs.version }}" --notes-file /tmp/release_notes.md
